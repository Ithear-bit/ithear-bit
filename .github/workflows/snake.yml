# Имя вашего workflow
name: Generate snake animation

on:
  schedule:
    # Запускать автоматически каждый день в 00:00 UTC
    - cron: "0 0 * * *"  

  # Давать возможность запустить вручную через вкладку Actions
  workflow_dispatch:

  # Запускать при пуше в главную ветку, чтобы сразу увидеть результат
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Разрешить запись в репозиторий

    steps:
      # Генерирует саму змейку
      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }} # Ваш username
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Отправляет сгенерированные файлы в отдельную ветку 'output'
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
